name: Build Patisserie APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Android)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev build-essential libsqlite3-dev libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools
          pip install buildozer cython==0.29.33

      - name: Create buildozer.spec
        run: |
          python3 - << 'EOF'
          spec = """[app]
          title = Patisserie Orientale
          package.name = patisserieorientale
          package.domain = org.patisserie
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas
          version = 1.0.0
          requirements = python3,kivy==2.3.0
          orientation = portrait
          fullscreen = 0
          android.permissions = WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.sdk = 33
          android.arch = arm64-v8a
          android.accept_sdk_license = True

          [buildozer]
          log_level = 2
          warn_on_root = 1
          """
          # Strip leading spaces from each line
          lines = [line.lstrip() for line in spec.splitlines()]
          with open("buildozer.spec", "w") as f:
              f.write("\n".join(lines))
          print("buildozer.spec created OK")
          EOF

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          yes | buildozer android debug 2>&1 | tee buildozer.log
          echo "=== bin/ ==="
          ls -la bin/ || echo "Dossier bin introuvable"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: patisserie-orientale-debug
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log
          retention-days: 7
